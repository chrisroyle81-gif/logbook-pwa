<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e0e0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Logbook</title>
<style>
  :root {
    --bg: #0e0e0c;
    --panel: #16161310;
    --ink: #e8e4d8;
    --muted: #8a857a;
    --line: #2a2823;
    --accent: #d9954a;
    --accent-dim: #8a5e2c;
    --bad: #c66060;
    --good: #6a9a5a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
    font-size: 16px; line-height: 1.5;
    overscroll-behavior: none;
  }
  body {
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .brand {
    font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; font-size: 13px;
  }
  .brand::before {
    content: '⊹'; color: var(--accent); margin-right: 8px;
  }
  .meta {
    font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
  }
  main {
    flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
  }
  .home {
    flex: 1; display: flex; flex-direction: column; gap: 14px; justify-content: center;
  }
  .home button {
    background: transparent; color: var(--ink);
    border: 1px solid var(--line); border-left: 3px solid var(--accent);
    padding: 28px 24px; text-align: left; font: inherit; font-size: 18px;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .home button:active { background: var(--panel); border-left-color: var(--ink); }
  .home button .label {
    display: block; font-weight: 600; letter-spacing: 0.04em;
  }
  .home button .sub {
    display: block; color: var(--muted); font-size: 12px; margin-top: 6px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .capture { display: none; flex-direction: column; gap: 14px; flex: 1; }
  .capture.active { display: flex; }
  .field-meta {
    display: flex; gap: 16px; font-size: 11px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .field-meta span { display: inline-flex; align-items: center; gap: 6px; }
  .field-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .field-meta .dot.live { background: var(--accent); animation: pulse 1.4s infinite; }
  .field-meta .dot.ok { background: var(--good); }
  .field-meta .dot.err { background: var(--bad); }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.4); }
  }
  textarea {
    flex: 1; min-height: 240px;
    background: transparent; color: var(--ink); border: 1px solid var(--line);
    padding: 16px; font: inherit; font-size: 17px; line-height: 1.55;
    resize: none; outline: none;
  }
  textarea:focus { border-color: var(--accent-dim); }
  .voice-display {
    flex: 1; min-height: 240px;
    border: 1px solid var(--line); padding: 16px;
    font-size: 17px; line-height: 1.55;
    overflow-y: auto; white-space: pre-wrap;
  }
  .voice-display .interim { color: var(--muted); }
  .voice-display:empty::before {
    content: 'Listening…'; color: var(--muted); font-style: italic;
  }
  .actions {
    display: flex; gap: 10px;
  }
  .actions button {
    flex: 1; padding: 16px; font: inherit; font-size: 14px;
    background: transparent; color: var(--ink);
    border: 1px solid var(--line); cursor: pointer;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .actions button.primary {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    font-weight: 600;
  }
  .actions button:active { transform: translateY(1px); }
  .actions button:disabled { opacity: 0.4; }
  .toast {
    position: fixed; left: 16px; right: 16px; bottom: calc(20px + env(safe-area-inset-bottom));
    background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--good);
    padding: 14px 16px; font-size: 13px; letter-spacing: 0.05em;
    transform: translateY(120%); transition: transform 0.3s; z-index: 100;
  }
  .toast.show { transform: translateY(0); }
  .toast.err { border-left-color: var(--bad); }
  .queue {
    font-size: 11px; color: var(--muted); padding: 8px 0;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .queue.has { color: var(--accent); }
  .settings-link {
    color: var(--muted); font-size: 11px; text-decoration: none;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .settings {
    display: none; flex-direction: column; gap: 14px; flex: 1;
  }
  .settings.active { display: flex; }
  .settings label {
    display: flex; flex-direction: column; gap: 6px; font-size: 11px;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .settings input {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
    padding: 12px; font: inherit; font-size: 14px; outline: none;
  }
  .settings input:focus { border-color: var(--accent-dim); }
  .settings .hint { font-size: 11px; color: var(--muted); line-height: 1.6; text-transform: none; letter-spacing: 0; }
</style>
</head>
<body>

<header>
  <div class="brand">Logbook</div>
  <a href="#" class="settings-link" id="settingsBtn">Setup</a>
</header>

<main>
  <!-- HOME -->
  <section class="home" id="home">
    <button id="btnTalk">
      <span class="label">Talk</span>
      <span class="sub">Voice dictation</span>
    </button>
    <button id="btnType">
      <span class="label">Type</span>
      <span class="sub">Keyboard entry</span>
    </button>
    <div class="queue" id="queueStatus"></div>
  </section>

  <!-- CAPTURE -->
  <section class="capture" id="capture">
    <div class="field-meta">
      <span><span class="dot" id="modeDot"></span><span id="modeLabel"></span></span>
      <span><span class="dot" id="locDot"></span><span id="locLabel">locating…</span></span>
      <span id="timeLabel"></span>
    </div>
    <textarea id="typeInput" placeholder="…" style="display:none"></textarea>
    <div class="voice-display" id="voiceDisplay" style="display:none"></div>
    <div class="actions">
      <button id="btnCancel">Cancel</button>
      <button id="btnSubmit" class="primary">Save</button>
    </div>
  </section>

  <!-- SETTINGS -->
  <section class="settings" id="settings">
    <label>
      Apps Script Web App URL
      <input type="url" id="cfgUrl" placeholder="https://script.google.com/macros/s/…/exec">
    </label>
    <label>
      Shared Token
      <input type="text" id="cfgToken" placeholder="(matches SHARED_TOKEN in Code.gs)">
    </label>
    <p class="hint">Both values must match what's in your Apps Script. Stored locally in your browser only — never sent anywhere except your endpoint.</p>
    <div class="actions">
      <button id="cfgCancel">Back</button>
      <button id="cfgSave" class="primary">Save</button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
// ---------- CONFIG ----------
const LS_URL = 'logbook.url';
const LS_TOKEN = 'logbook.token';
const LS_QUEUE = 'logbook.queue';

// ---------- ELEMENTS ----------
const $ = (id) => document.getElementById(id);
const home = $('home'), capture = $('capture'), settings = $('settings');
const typeInput = $('typeInput'), voiceDisplay = $('voiceDisplay');
const modeDot = $('modeDot'), modeLabel = $('modeLabel');
const locDot = $('locDot'), locLabel = $('locLabel');
const timeLabel = $('timeLabel'), toast = $('toast');
const queueStatus = $('queueStatus');

// ---------- STATE ----------
let mode = null;           // 'talk' | 'type'
let recognition = null;
let finalText = '';
let coords = null;         // {lat, lng} once available
let timestampISO = null;

// ---------- VIEWS ----------
function showHome() {
  home.style.display = 'flex';
  capture.classList.remove('active');
  settings.classList.remove('active');
  updateQueueStatus();
}
function showCapture(m) {
  mode = m;
  finalText = '';
  timestampISO = new Date().toISOString();
  home.style.display = 'none';
  capture.classList.add('active');
  settings.classList.remove('active');

  modeLabel.textContent = m === 'talk' ? 'voice' : 'type';
  modeDot.className = 'dot live';
  timeLabel.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  // Get location
  locLabel.textContent = 'locating…';
  locDot.className = 'dot live';
  coords = null;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        locLabel.textContent = `${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
        locDot.className = 'dot ok';
      },
      (err) => {
        locLabel.textContent = 'no location';
        locDot.className = 'dot err';
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
    );
  } else {
    locLabel.textContent = 'unsupported';
    locDot.className = 'dot err';
  }

  if (m === 'talk') {
    typeInput.style.display = 'none';
    voiceDisplay.style.display = 'block';
    voiceDisplay.textContent = '';
    startVoice();
  } else {
    voiceDisplay.style.display = 'none';
    typeInput.style.display = 'block';
    typeInput.value = '';
    setTimeout(() => typeInput.focus(), 50);
  }
}
function showSettings() {
  home.style.display = 'none';
  capture.classList.remove('active');
  settings.classList.add('active');
  $('cfgUrl').value = localStorage.getItem(LS_URL) || '';
  $('cfgToken').value = localStorage.getItem(LS_TOKEN) || '';
}

// ---------- VOICE ----------
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    voiceDisplay.textContent = 'Voice not supported on this browser. Use Type instead.';
    return;
  }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = navigator.language || 'en-AU';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) finalText += r[0].transcript + ' ';
      else interim += r[0].transcript;
    }
    voiceDisplay.innerHTML = escapeHtml(finalText) + `<span class="interim">${escapeHtml(interim)}</span>`;
    voiceDisplay.scrollTop = voiceDisplay.scrollHeight;
  };
  recognition.onerror = (e) => {
    console.warn('Voice error', e);
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      voiceDisplay.textContent = 'Microphone permission denied. Use Type instead.';
    }
  };
  recognition.onend = () => {
    // auto-restart while we're still on the capture screen
    if (mode === 'talk' && capture.classList.contains('active')) {
      try { recognition.start(); } catch(e) {}
    }
  };
  try { recognition.start(); } catch(e) {}
}
function stopVoice() {
  if (recognition) {
    try { recognition.onend = null; recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// ---------- SUBMIT ----------
async function submit() {
  const content = mode === 'talk' ? finalText.trim() : typeInput.value.trim();
  if (!content) {
    showToast('Nothing to save', true);
    return;
  }
  stopVoice();
  $('btnSubmit').disabled = true;

  const payload = {
    ts: timestampISO,
    lat: coords ? coords.lat : null,
    lng: coords ? coords.lng : null,
    content: content,
    mode: mode
  };

  const ok = await sendPayload(payload);
  if (ok) {
    showToast('Saved');
  } else {
    enqueue(payload);
    showToast('Offline — queued', true);
  }
  $('btnSubmit').disabled = false;
  showHome();
}

async function sendPayload(payload) {
  const url = localStorage.getItem(LS_URL);
  const token = localStorage.getItem(LS_TOKEN);
  if (!url || !token) {
    showToast('Set URL and token in Setup', true);
    return false;
  }
  try {
    const res = await fetch(url, {
      method: 'POST',
      // text/plain avoids the CORS preflight that Apps Script doesn't handle well
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ ...payload, token })
    });
    if (!res.ok) return false;
    const data = await res.json().catch(() => ({}));
    return data.ok !== false;
  } catch (e) {
    return false;
  }
}

// ---------- QUEUE (offline retry) ----------
function loadQueue() { try { return JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); } catch(e) { return []; } }
function saveQueue(q) { localStorage.setItem(LS_QUEUE, JSON.stringify(q)); }
function enqueue(p) { const q = loadQueue(); q.push(p); saveQueue(q); }
async function flushQueue() {
  let q = loadQueue();
  if (!q.length) return;
  const remaining = [];
  for (const p of q) {
    const ok = await sendPayload(p);
    if (!ok) remaining.push(p);
  }
  saveQueue(remaining);
  updateQueueStatus();
  if (q.length && !remaining.length) showToast(`Flushed ${q.length} queued`);
}
function updateQueueStatus() {
  const n = loadQueue().length;
  if (n) {
    queueStatus.textContent = `${n} entr${n===1?'y':'ies'} queued — will retry on send`;
    queueStatus.classList.add('has');
  } else {
    queueStatus.textContent = '';
    queueStatus.classList.remove('has');
  }
}

// ---------- TOAST ----------
let toastTimer = null;
function showToast(msg, isErr) {
  toast.textContent = msg;
  toast.classList.toggle('err', !!isErr);
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ---------- UTIL ----------
function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- WIRE UP ----------
$('btnTalk').addEventListener('click', () => showCapture('talk'));
$('btnType').addEventListener('click', () => showCapture('type'));
$('btnCancel').addEventListener('click', () => { stopVoice(); showHome(); });
$('btnSubmit').addEventListener('click', submit);
$('settingsBtn').addEventListener('click', (e) => { e.preventDefault(); showSettings(); });
$('cfgCancel').addEventListener('click', showHome);
$('cfgSave').addEventListener('click', () => {
  localStorage.setItem(LS_URL, $('cfgUrl').value.trim());
  localStorage.setItem(LS_TOKEN, $('cfgToken').value.trim());
  showToast('Saved');
  showHome();
});

// First-run: open settings if not configured
window.addEventListener('load', () => {
  if (!localStorage.getItem(LS_URL) || !localStorage.getItem(LS_TOKEN)) {
    showSettings();
  } else {
    showHome();
    flushQueue(); // try to flush anything queued from last session
  }
});

// Re-flush when we regain network
window.addEventListener('online', flushQueue);

// Register service worker (optional, for installability + offline shell)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
